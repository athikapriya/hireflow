{% extends 'accounts/user_authentication.html' %}

{% block content%}
<!-- =============== form header =============== -->
<div class=" mb-2">
    <h1 class=" text-center mb-3 form-heading">Password Reset</h1>
    <p class=" description">Forgotten your password? Enter your email address below, and we’ll email instructions for setting a new one.</p>
</div>

<!-- =============== password reset email form starts =============== -->
<form action="" method="POST">
    {% csrf_token %}

    <!-- email -->
    <div class="mb-3 d-flex flex-column form-group">
        <label for="email" class="form-label">Enter your email :</label>
        <input type="email" name="email" id="email" class="form-control custom-input" placeholder="Your email address">
    </div>

    <!-- submit -->
    <div class="d-grid mt-4">
        <button type="submit" class="btn btn-primary btn-submit">Reset Password</button>
    </div>
</form>
{% endblock %}
