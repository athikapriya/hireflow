{% load static %}

<!-- =============== topbar starts =============== -->
<nav class="navbar navbar-expand-lg navbar-light navbar-custom">
    <div class="container-fluid pe-0">


      <!-- =============== logo starts =============== -->
      <a href="{% url 'dashboard' %}" class="text-decoration-none">
        <div style="height: 28px;" class="text-center d-flex align-items-center topbar-logo ">
          <img src="{% static 'images/logo.webp' %}" alt="HireFlow logo" style="height: 100%;">
        </div>
      </a>
      <!-- =============== logo ends =============== -->


      <!-- =============== toggler =============== -->
        <button class="btn d-flex align-items-center" id="sidebarToggle" aria-label="Toggle sidebar">
          <i class="fa-solid fa-bars-staggered"></i>
        </button>


        <!-- =============== search bar =============== -->
        <form class="d-flex ms-3 d-flex align-items-center search-form">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" fill="currentColor"
          class="" height="16" width="16">
            <path d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"/></svg>
          <input class="form-control me-2" type="search" placeholder="Search..." aria-label="Search">
        </form>


        <!-- =============== user section =============== -->
        <div class="ms-auto d-flex align-items-center">
          <div class="me-3">
            <i class="fa-regular fa-bell"></i>
          </div>
          <div class="d-flex align-items-center py-2 px-3" style="background-color: var(--quaternary-color);">
            <div style="height: 28px;">
              <img src="{% static 'images/profile.svg' %}" class="rounded-circle me-3 h-100" alt="user">
            </div>
            
            <div>
              <span style="display: block; font-size: 0.8rem; color:var(--tertiary-color)" class="fw-semibold">John Doe</span>
              <span style="display: block; font-size: 0.8rem;">Founder</span>
            </div>
          </div>
        </div>

    </div>
</nav>
<!-- =============== topbar ends =============== -->
