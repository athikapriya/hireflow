{% extends "base/main.html" %}
{% block content %}
<h2>Edit Job</h2>

<form method="POST">
    {% csrf_token %}
    <label>Title:</label><br>
    <input type="text" name="title" value="{{ job.title }}"><br><br>

    <label>Description:</label><br>
    <textarea name="description">{{ job.description }}</textarea><br><br>

    <label>Location:</label><br>
    <input type="text" name="location" value="{{ job.location }}"><br><br>

    <label>Salary:</label><br>
    <input type="text" name="salary" value="{{ job.salary }}"><br><br>

    <label>Job Type:</label><br>
    <select name="job_type">
        <option value="full_time" {% if job.job_type == "full_time" %}selected{% endif %}>Full Time</option>
        <option value="part_time" {% if job.job_type == "part_time" %}selected{% endif %}>Part Time</option>
        <option value="remote" {% if job.job_type == "remote" %}selected{% endif %}>Remote</option>
        <option value="internship" {% if job.job_type == "internship" %}selected{% endif %}>Internship</option>
    </select><br><br>

    <label>Experience Required:</label><br>
    <input type="text" name="experience_required" value="{{ job.experience_required }}"><br><br>

    <button type="submit" class="btn btn-success">Update Job</button>
</form>
{% endblock %}
