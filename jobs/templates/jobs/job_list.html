{% extends "base/main.html" %}
{% block content %}
<h2>All Jobs</h2>
<ul>
    {% for job in jobs %}
        <li>
            <a href="{% url 'jobs:job_detail' job.slug %}">{{ job.title }}</a>
            at {{ job.company.name }} ({{ job.job_type }})
        </li>
    {% empty %}
        <li>No jobs available.</li>
    {% endfor %}
</ul>
{% endblock %}
